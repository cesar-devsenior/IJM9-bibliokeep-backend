name: "Backend CI: Spring boot & Java 21"

on:
  push: 
    branches: 
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: "Configurar JDK 21"
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: "Dar permisos de ejecuccion al gradlew"
        run: chmod +x ./gradlew

      - name: "Gradle Build"
        run: ./gradlew build --no-daemon -x tests
