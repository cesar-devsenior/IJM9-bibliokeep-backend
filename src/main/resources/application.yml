spring:
  application:
    name: bibliokeep-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bibliokeep}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:admin123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${SERVER_PORT:8080}


app:
  jwt:
    secret: ${APP_JWT_SECRET:my-secret-key-for-jwt-token-generation-and-validation-12345}
    expiration: ${APP_JWT_EXPIRATION:86400000}
  upload:
    directory: ${APP_UPLOAD_DIRECTORY:./uploads}
    path-pattern: /content
    cache-period: ${APP_UPLOAD_CACHE:3600}
  cors:
    allowed-origins: ${APP_ALLOWED_ORIGINS:http://localhost:4200}
 